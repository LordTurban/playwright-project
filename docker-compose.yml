services:
  jenkins:
    build: .
    privileged: true
    user: root # Keep as root for now to ensure socket permissions
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  jenkins_data:
