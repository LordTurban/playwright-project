services:
  jenkins:
    image: jenkins/jenkins:lts
    privileged: true
    user: root # Necessary to access the Docker socket inside the container
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always

volumes:
  jenkins_data:
